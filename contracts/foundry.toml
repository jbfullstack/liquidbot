[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.23"
optimizer = true
optimizer_runs = 200

[profile.default.fuzz]
runs = 2000

[profile.default.invariant]
runs = 256
depth = 15

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"

[etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
